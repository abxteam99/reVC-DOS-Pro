<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no" />
    <title>Grand Theft Auto: Vice City</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* AirBreak overlay – hidden by default */
        #airbreak-overlay {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100001;
            display: none;
            touch-action: none;
        }
        #airbreak-overlay.active { display: block; }
        .airbreak-joystick {
            width: 120px;
            height: 120px;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #0ff;
            border-radius: 50%;
            position: relative;
            touch-action: none;
        }
        .airbreak-joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 255, 0.6);
            border: 2px solid #0ff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .airbreak-vertical-btns {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 100001;
        }
        .airbreak-vertical-btns.active { display: flex; }
        .airbreak-v-btn {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #0ff;
            border-radius: 10px;
            color: #0ff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .airbreak-v-btn:active { background: rgba(0, 255, 255, 0.5); }
        #airbreak-toggle-fly {
            position: fixed;
            bottom: 160px;
            right: 20px;
            width: 80px;
            height: 40px;
            background: rgba(255, 255, 0, 0.2);
            border: 2px solid #ff0;
            border-radius: 10px;
            color: #ff0;
            font-size: 12px;
            font-weight: bold;
            z-index: 100001;
            display: none;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        #airbreak-toggle-fly.active { background: rgba(255, 255, 0, 0.5); }
        #airbreak-toggle-fly.visible { display: flex; }

        /* File picker overlay */
        #file-loader-overlay {
            position: fixed;
            inset: 0;
            z-index: 999999;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
        #file-loader-overlay h2 {
            margin-bottom: 10px;
            color: #ff00ff;
        }
        #file-loader-overlay input[type="file"] {
            margin: 10px;
            padding: 10px;
            background: #333;
            border: 2px solid #ff00ff;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            width: 80%;
            max-width: 400px;
        }
        #file-loader-overlay .status {
            font-size: 14px;
            min-height: 24px;
        }
        #file-loader-overlay .status.loaded { color: #0f0; }
        #file-loader-overlay .status.error { color: #f44; }
        #start-game-btn {
            margin-top: 25px;
            padding: 14px 50px;
            background: #555;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #start-game-btn:enabled {
            background: #ff00ff;
            box-shadow: 0 0 20px #ff00ff88;
        }
        #start-game-btn:enabled:hover {
            background: #ff44ff;
        }
        #progress-text {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
            min-height: 24px;
        }
    </style>
</head>
<body
    data-is-touch="0"
    data-state-car="0"
    data-state-car-gun="0"
    data-state-gun="0"
    data-state-bike="0"
    data-state-menu="0"
    data-state-cutscene="0"
    data-state-mobring="0"
    data-state-job="0"
    data-state-disable-controls="0"
    data-state-panzer="0"
    data-state-car-with-weapon="0"
    data-state-hunter="0"
    data-state-scope-mode="0"
    data-state-scope-gun="0"
>
    <div class="wasted-container" hidden></div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <!-- Original touch controls -->
    <div class="touch-controls-wrapper" id="touch-controls-wrapper">
        <div id="move"></div>
        <div id="look"></div>
        <div class="touch-control radio"></div>
        <div class="touch-control weapon"></div>
        <div class="touch-control menu"></div>
        <div class="touch-control fist"></div>
        <div class="touch-control drift"></div>
        <div class="touch-control run"></div>
        <div class="touch-control car getIn"></div>
        <div class="touch-control left"></div>
        <div class="touch-control right"></div>
        <div class="touch-control jump"></div>
        <div class="touch-control car getOut"></div>
        <div class="touch-control camera"></div>
        <div class="touch-control mobile"></div>
        <div class="touch-control job"></div>
        <div class="touch-control horn"></div>
        <div class="touch-control fireRight"></div>
        <div class="touch-control fireLeft"></div>
        <div class="touch-control back"></div>
        <div class="touch-control down"></div>
        <div class="touch-control home"></div>
        <div class="touch-control cheat"></div>
    </div>

    <!-- AirBreak overlay -->
    <div id="airbreak-overlay">
        <div class="airbreak-joystick" id="airbreak-joystick">
            <div class="airbreak-joystick-knob" id="airbreak-joystick-knob"></div>
        </div>
    </div>
    <div class="airbreak-vertical-btns" id="airbreak-vertical-btns">
        <div class="airbreak-v-btn" id="airbreak-up-btn">↑</div>
        <div class="airbreak-v-btn" id="airbreak-down-btn">↓</div>
    </div>
    <div id="airbreak-toggle-fly">FLY</div>

    <!-- File picker overlay (OFFLINE LOADER) -->
    <div id="file-loader-overlay">
        <h2>📂 Select Game Files</h2>
        <p style="margin:5px 0;">1. Choose <strong>vc-sky-en-v6.data</strong></p>
        <input type="file" id="data-file-input" accept=".data">
        <div id="data-status" class="status">Not loaded</div>

        <p style="margin:20px 0 5px;">2. Choose <strong>vc-sky-en-v6.wasm</strong></p>
        <input type="file" id="wasm-file-input" accept=".wasm">
        <div id="wasm-status" class="status">Not loaded</div>

        <button id="start-game-btn" disabled>▶ START GAME</button>
        <div id="progress-text">Please select both files above.</div>
    </div>

    <!-- Loader (original) -->
    <div class="loader-container" id="loader-container">
        <div class="progress-bar-container" id="spinner">
            <div class="progress-bar-fill"></div>
        </div>
        <div id="status">Downloading...</div>
        <div><progress id="progress" hidden></progress></div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script>
        (function() {
            let settings = {};
            try {
                const saved = localStorage.getItem('vcsky.settings');
                if (saved) settings = JSON.parse(saved);
            } catch (e) {}
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0 ||
                                  window.matchMedia('(pointer: coarse)').matches;
            let isTouch = isTouchDevice;
            if (settings.mode === 'touch') isTouch = true;
            else if (settings.mode === 'desktop') isTouch = false;
            window.__isTouchMode = isTouch;
            window.__showTouchControls = settings.touchControls !== undefined ? settings.touchControls : true;
            window.__cheatsEnabled = settings.cheats !== undefined ? settings.cheats : true;
            window.__lowMemoryMode = settings.lowMemory || false;
            window.__maxFPS = settings.maxFPS || 0;
            localStorage.setItem('vcsky.mode', settings.mode || 'auto');
            localStorage.setItem('vcsky.touchControls', window.__showTouchControls ? '1' : '0');
            localStorage.setItem('vcsky.cheats', window.__cheatsEnabled ? '1' : '0');
            localStorage.setItem('vcsky.lowMemory', window.__lowMemoryMode ? '1' : '0');
            localStorage.setItem('vcsky.maxFPS', String(window.__maxFPS));
            document.body.dataset.isTouch = isTouch ? '1' : '0';
            console.log('🎮 Game page loaded with settings:', settings);
        })();
    </script>

    <script type="text/javascript" src="debug.js"></script>
    <script type="text/javascript" src="GamepadEmulator.js"></script>
    <!-- game.js is now loaded below, but we include it after the API setup -->
    <script type="text/javascript" src="game.js"></script>

    <!-- API and popup opener -->
    <script>
        (function() {
            window.__gameApi = {
                typeCheat: function(code) {
                    if (typeof window.typeCheat === 'function') window.typeCheat(code);
                    else { if (!window._cheatQueue) window._cheatQueue = []; window._cheatQueue.push(code); }
                },
                addMoney: function() { if (typeof window.addMoney === 'function') window.addMoney(); },
                getDebugLogs: function() {
                    if (typeof window.getDebugLogLines === 'function') return window.getDebugLogLines();
                    return [];
                },
                scanMemory: function(value, type) {
                    if (typeof window._scanMemory === 'function') return window._scanMemory(value, type);
                    return [];
                },
                readMemory: function(addr, type) {
                    if (typeof window.readMemory === 'function') return window.readMemory(addr, type);
                    return null;
                },
                writeMemory: function(addr, type, value) {
                    if (typeof window.writeMemory === 'function') window.writeMemory(addr, type, value);
                },
                toggleGodMode: function(enable) {
                    if (typeof window.toggleGodMode === 'function') window.toggleGodMode(enable);
                },
                toggleAirBrake: function(enable) {
                    if (typeof window.toggleAirBrake === 'function') window.toggleAirBrake(enable);
                },
                setFlySpeed: function(speed) {
                    if (typeof window.setFlySpeed === 'function') window.setFlySpeed(speed);
                },
                toggleFullscreen: function(enable) {
                    if (typeof Browser !== 'undefined' && Browser.requestFullscreen && Browser.exitFullscreen) {
                        if (enable === undefined) {
                            enable = !Browser.isFullscreen;
                        }
                        if (enable) {
                            Browser.requestFullscreen();
                        } else {
                            try { Browser.exitFullscreen(); } catch(e) {}
                        }
                    }
                },
                getErrorLogs: function() {
                    if (window._errorLogs) return window._errorLogs.map(e => `[${e.timestamp}] ${e.type}: ${e.message}`);
                    return [];
                },
                clearLogs: function() {
                    if (typeof window.clearLogs === 'function') window.clearLogs();
                },
                cheatWindowClosed: function() { console.log('Cheat popup closed.'); }
            };

            window.openCheatPopup = function() {
                if (window.cheatWindow && !window.cheatWindow.closed) {
                    window.cheatWindow.focus();
                    return;
                }
                const width = Math.min(400, window.innerWidth - 40);
                const height = Math.min(600, window.innerHeight - 40);
                const left = (window.innerWidth - width) / 2;
                const top = (window.innerHeight - height) / 2;
                const features = `width=${width},height=${height},left=${left},top=${top},scrollbars=yes,resizable=yes`;
                window.cheatWindow = window.open('cheats.html', 'CheatEngine', features);
                if (window.cheatWindow) window.cheatWindow.focus();
                else window.open('cheats.html', '_blank');
            };

            // Cheat button opens the cheat popup
            document.querySelector('.touch-control.cheat')?.addEventListener('click', window.openCheatPopup);
            document.querySelector('.touch-control.cheat')?.addEventListener('touchstart', function(e) {
                e.preventDefault();
                window.openCheatPopup();
            }, { passive: false });

            // Home button redirects to the launcher page
            document.querySelector('.touch-control.home')?.addEventListener('click', function() {
                window.location.href = 'index.html';
            });
            document.querySelector('.touch-control.home')?.addEventListener('touchstart', function(e) {
                e.preventDefault();
                window.location.href = 'index.html';
            }, { passive: false });

            // Ensure canvas touch events after load
            window.addEventListener('load', function() {
                const canvas = document.getElementById('canvas');
                if (canvas) {
                    canvas.style.touchAction = 'none';
                    canvas.style.pointerEvents = 'auto';
                    console.log('[Game] Canvas touch settings applied on load.');
                }
            });

            console.log('🛠️ Game API exposed.');
        })();
        
    </script>

    <script>
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F3') {
                e.preventDefault();
                if (typeof window.openCheatPopup === 'function') window.openCheatPopup();
            }
        });
    </script>
</body>
</html>
