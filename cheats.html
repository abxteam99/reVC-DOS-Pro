<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Cheat Engine</title>
    <style>
        :root {
            --bg-dark: #07070d;
            --bg-panel: #111122;
            --bg-input: #1a1a30;
            --color-text: #e2e8f0;
            --color-muted: #8a99ad;
            --accent-pink: #ff00ff;
            --accent-cyan: #00ffff;
            --accent-gold: #ffd700;
            --accent-danger: #ff4444;
            --border-color: #2a2a44;
            --border-hover: #ff00ff88;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: var(--color-text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #cheat-engine-ui {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: var(--bg-dark);
        }

        h1 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: .05em;
            text-transform: uppercase;
            margin: 0;
            padding: 14px 16px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        h1 button {
            background: none;
            border: none;
            color: var(--accent-danger);
            font-size: 18px;
            cursor: pointer;
            touch-action: manipulation;
            transition: transform .2s, opacity .2s;
        }

        h1 button:hover {
            transform: scale(1.1);
            opacity: .8;
        }

        .ce-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: #0d0d18;
            flex-shrink: 0;
        }

        .ce-tabs button {
            flex: 1;
            background: none;
            border: none;
            color: var(--color-muted);
            padding: 12px 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .03em;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            touch-action: manipulation;
            transition: all .2s ease;
        }

        .ce-tabs button.active {
            color: #fff;
            border-bottom-color: var(--accent-pink);
            background: var(--bg-panel);
            text-shadow: 0 0 8px var(--accent-pink);
        }

        .ce-tab-content {
            display: none;
            padding: 14px 16px;
            flex: 1;
            overflow-y: auto;
        }

        .ce-tab-content.active {
            display: block;
        }

        .ce-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        .ce-input-row input,
        .ce-input-row select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            font-size: 13px;
            border-radius: 6px;
            flex: 1;
            outline: none;
            transition: border-color .2s;
        }

        .ce-input-row input:focus,
        .ce-input-row select:focus {
            border-color: var(--accent-cyan);
        }

        .ce-btn-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        .ce-btn-row button,
        .cheat-grid button {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: #cbd5e1;
            padding: 10px 6px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            touch-action: manipulation;
            transition: all .15s ease;
        }

        .ce-btn-row button:hover,
        .cheat-grid button:hover {
            background: rgba(255, 0, 255, .08);
            border-color: var(--border-hover);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 0, 255, .15);
        }

        .results {
            max-height: 150px;
            overflow-y: auto;
            background: #05050a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-top: 10px;
            font-size: 11px;
        }

        .log-container {
            background: #05050a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            user-select: text;
            margin-top: 6px;
        }

        #cheat-debug-log {
            color: #10b981;
        }

        #cheat-error-log {
            color: var(--accent-danger);
        }

        .ce-status {
            font-size: 11px;
            color: var(--color-muted);
            margin-top: 6px;
            letter-spacing: .02em;
        }

        .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a2e;
        }

        .switch-row label {
            font-size: 13px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #2a2a40;
            transition: .2s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            transition: .2s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent-pink);
            box-shadow: 0 0 8px rgba(255, 0, 255, .4);
        }

        input:checked+.slider:before {
            transform: translateX(18px);
        }

        .money-btn {
            background: rgba(255, 215, 0, .08) !important;
            border: 1px solid var(--accent-gold) !important;
            color: var(--accent-gold) !important;
            font-weight: 700 !important;
            width: 100%;
            margin: 12px 0 6px 0;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .money-btn:hover {
            background: rgba(255, 215, 0, .18) !important;
            box-shadow: 0 0 10px rgba(255, 215, 0, .2) !important;
        }

        .cheat-cat {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-cyan);
            margin: 16px 0 6px 0;
            text-transform: uppercase;
            letter-spacing: .08em;
            text-shadow: 0 0 6px rgba(0, 255, 255, .2);
        }

        .cheat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a44;
            border-radius: 10px;
        }

        .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
        }

        .log-header label {
            font-size: 12px;
            color: var(--color-muted);
        }

        .copy-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--color-text);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 8px;
            touch-action: manipulation;
            transition: all .2s;
        }

        .copy-btn:hover {
            background: rgba(255, 0, 255, .08);
            border-color: var(--accent-pink);
        }

        .error-box {
            display: none;
            padding: 20px;
            text-align: center;
            color: var(--accent-danger);
        }

        .error-box.visible {
            display: block;
        }

        .ui-disabled {
            opacity: .35;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <script>
        (function() {
            const gameOpener = window.opener;
            let gameApi = null;
            let gameAvailable = false;

            if (gameOpener && !gameOpener.closed && gameOpener.__gameApi) {
                gameApi = gameOpener.__gameApi;
                gameAvailable = true;
            } else {
                document.getElementById('error-box').classList.add('visible');
                document.querySelector('#cheat-engine-ui').classList.add('ui-disabled');
                console.warn('Cheat page: No game window found.');
                document.getElementById('cheat-close-btn').addEventListener('click', () => window.close());
                return;
            }

            function callGameApi(method, ...args) {
                if (!gameAvailable || !gameApi || typeof gameApi[method] !== 'function') {
                    console.warn('Game API not available for:', method);
                    return null;
                }
                try {
                    return gameApi[method](...args);
                } catch (e) {
                    console.error('Error calling gameApi.' + method, e);
                    return null;
                }
            }

            const statusEl = document.getElementById('ce-status');
            function updateStatus(text) { statusEl.textContent = text; }

            let results = [];
            let isSearching = false;

            function ensureLastVal(resultObj) {
                if (resultObj && resultObj.addr !== undefined) {
                    if (resultObj.lastVal === undefined) {
                        resultObj.lastVal = resultObj.val !== undefined ? resultObj.val : callGameApi('readMemory', resultObj.addr, resultObj.type);
                    }
                }
                return resultObj;
            }

            function firstSearch() {
                if (isSearching) return;
                const valStr = document.getElementById('ce-value').value;
                const type = document.getElementById('ce-type').value;
                const val = parseFloat(valStr);
                if (isNaN(val)) { updateStatus("Invalid value"); return; }
                isSearching = true;
                updateStatus("Searching...");
                try {
                    const raw = callGameApi('scanMemory', val, type) || [];
                    results = raw.map(r => ensureLastVal(r));
                    updateStatus(`Found ${results.length} addresses`);
                } catch (e) { updateStatus("Error: " + e.message); }
                isSearching = false;
                displayResults();
            }

            function nextSearch() {
                if (isSearching || results.length === 0) {
                    if (results.length === 0) updateStatus("No results. Do 'New' search first.");
                    return;
                }
                const valStr = document.getElementById('ce-value').value;
                const val = parseFloat(valStr);
                if (isNaN(val)) { updateStatus("Invalid value"); return; }
                isSearching = true;
                updateStatus("Filtering...");
                try {
                    const allResults = callGameApi('scanMemory', val, 'any') || [];
                    const addrSet = new Set(results.map(r => r.addr));
                    const filtered = allResults.filter(r => addrSet.has(r.addr));
                    results = filtered.map(r => ensureLastVal(r));
                    updateStatus(`Found ${results.length} addresses (filtered)`);
                } catch (e) { updateStatus("Error: " + e.message); }
                isSearching = false;
                displayResults();
            }

            function snapshotValues() {
                if (results.length === 0) { updateStatus("No results to snapshot"); return; }
                const valStr = document.getElementById('ce-value').value;
                const val = parseFloat(valStr);
                if (isNaN(val)) { updateStatus("Invalid value for snapshot"); return; }
                try {
                    const fresh = callGameApi('scanMemory', val, 'any') || [];
                    const addrSet = new Set(results.map(r => r.addr));
                    const filtered = fresh.filter(r => addrSet.has(r.addr));
                    results = filtered.map(r => ensureLastVal(r));
                    updateStatus(`Snapshot: ${results.length} values captured`);
                    displayResults();
                } catch (e) { updateStatus("Error: " + e.message); }
            }

            function filterResults(mode) {
                if (isSearching || results.length === 0) {
                    updateStatus("No results to filter. Do 'New' search first.");
                    return;
                }
                isSearching = true;
                updateStatus("Filtering...");
                try {
                    const updated = [];
                    for (const res of results) {
                        const currentVal = callGameApi('readMemory', res.addr, res.type);
                        if (currentVal === null) continue;
                        let match = false;
                        if (mode === 'inc' && currentVal > res.lastVal) match = true;
                        if (mode === 'dec' && currentVal < res.lastVal) match = true;
                        if (mode === 'changed' && Math.abs(currentVal - res.lastVal) > 0.0001) match = true;
                        if (match) {
                            res.lastVal = currentVal;
                            updated.push(res);
                        }
                    }
                    results = updated;
                    updateStatus(`Found ${results.length} addresses (compared to snapshot)`);
                    displayResults();
                } catch (e) { updateStatus("Error: " + e.message); }
                isSearching = false;
            }

            function displayResults() {
                const container = document.getElementById('ce-results');
                container.innerHTML = '';
                const limit = Math.min(results.length, 100);
                for (let i = 0; i < limit; i++) {
                    const res = results[i];
                    const div = document.createElement('div');
                    div.style.display = 'flex';
                    div.style.justifyContent = 'space-between';
                    div.style.marginBottom = '2px';
                    div.style.borderBottom = '1px solid #333';
                    let currentVal = '???';
                    try { currentVal = callGameApi('readMemory', res.addr, res.type); } catch (e) {}
                    div.innerHTML = `
                        <span style="color: #ff00ff;">0x${res.addr.toString(16)}</span>
                        <span style="color: #0ff;">${currentVal}</span>
                        <button class="cheat-btn" onclick="window.editAddr(${res.addr}, '${res.type}')">Edit</button>
                    `;
                    container.appendChild(div);
                }
            }

            window.editAddr = function(addr, type) {
                const newVal = prompt(`Enter new value for 0x${addr.toString(16)} (${type}):`);
                if (newVal === null) return;
                try {
                    const num = parseFloat(newVal);
                    if (isNaN(num)) { alert('Invalid number'); return; }
                    callGameApi('writeMemory', addr, type, num);
                    updateStatus(`Value at 0x${addr.toString(16)} updated`);
                    displayResults();
                } catch (e) { alert('Error writing to memory: ' + e.message); }
            };

            function viewManualAddr() {
                const addrStr = document.getElementById('ce-manual-addr').value;
                const addr = parseInt(addrStr, 16);
                if (isNaN(addr)) { alert('Invalid address'); return; }
                const container = document.getElementById('ce-manual-results');
                container.style.display = 'block';
                container.innerHTML = '';
                const types = ['i8', 'i16', 'i32', 'f32', 'f64'];
                types.forEach(type => {
                    let val = '???';
                    try { val = callGameApi('readMemory', addr, type); } catch (e) {}
                    const div = document.createElement('div');
                    div.style.display = 'flex';
                    div.style.justifyContent = 'space-between';
                    div.style.marginBottom = '2px';
                    div.innerHTML = `
                        <span style="color: #0ff;">${type.toUpperCase()}:</span>
                        <span>${val}</span>
                        <button class="cheat-btn" onclick="window.editAddr(${addr}, '${type}')">Edit</button>
                    `;
                    container.appendChild(div);
                });
            }

            document.querySelectorAll('.cheat-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const code = this.dataset.cheat;
                    if (code) {
                        callGameApi('typeCheat', code);
                        updateStatus(`Cheat entered: ${code}`);
                    }
                });
            });

            document.getElementById('ce-toggle-fullscreen').addEventListener('change', function(e) {
                callGameApi('toggleFullscreen', e.target.checked);
            });
            document.getElementById('ce-toggle-airbreak').addEventListener('change', function(e) {
                callGameApi('toggleAirBrake', e.target.checked);
            });
            document.getElementById('ce-toggle-godmode').addEventListener('change', function(e) {
                callGameApi('toggleGodMode', e.target.checked);
            });
            document.getElementById('ce-add-money').addEventListener('click', function() {
                callGameApi('addMoney');
                updateStatus('+$9999999 added!');
            });
            document.getElementById('ce-fly-speed').addEventListener('change', function() {
                const speed = parseFloat(this.value) || 2.0;
                callGameApi('setFlySpeed', speed);
                updateStatus(`Fly speed set to ${speed}`);
            });

            function updateNetworkLogs() {
                const logDiv = document.getElementById('cheat-debug-log');
                try {
                    const lines = callGameApi('getDebugLogs');
                    if (lines) logDiv.textContent = lines.join('\n');
                } catch (e) {}
            }

            function updateErrorLogs() {
                const logDiv = document.getElementById('cheat-error-log');
                try {
                    const lines = callGameApi('getErrorLogs');
                    if (lines) logDiv.textContent = lines.join('\n');
                } catch (e) {}
            }

            document.getElementById('copy-network-logs').addEventListener('click', function() {
                const text = document.getElementById('cheat-debug-log').textContent;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).catch(() => {});
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.left = '-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                }
            });
            document.getElementById('copy-error-logs').addEventListener('click', function() {
                const text = document.getElementById('cheat-error-log').textContent;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).catch(() => {});
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.left = '-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                }
            });
            document.getElementById('clear-debug-log-btn').addEventListener('click', function() {
                document.getElementById('cheat-debug-log').textContent = '';
                document.getElementById('cheat-error-log').textContent = '';
                callGameApi('clearLogs');
                updateStatus('Logs cleared');
            });

            let logInterval = null;
            function startLogPolling() {
                if (logInterval) clearInterval(logInterval);
                logInterval = setInterval(() => {
                    const activeTab = document.querySelector('.ce-tab-content.active');
                    if (activeTab && activeTab.id === 'tab-debugger') {
                        if (gameAvailable && gameApi) {
                            updateNetworkLogs();
                            updateErrorLogs();
                        }
                    }
                }, 1000);
            }
            startLogPolling();

            document.querySelectorAll('.ce-tabs button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.ce-tabs button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const tabId = 'tab-' + this.dataset.tab;
                    document.querySelectorAll('.ce-tab-content').forEach(t => t.classList.remove('active'));
                    const tab = document.getElementById(tabId);
                    if (tab) tab.classList.add('active');
                    if (this.dataset.tab === 'debugger') {
                        updateNetworkLogs();
                        updateErrorLogs();
                    }
                });
            });

            document.getElementById('ce-search').addEventListener('click', firstSearch);
            document.getElementById('ce-next').addEventListener('click', nextSearch);
            document.getElementById('ce-snap').addEventListener('click', snapshotValues);
            document.getElementById('ce-inc').addEventListener('click', () => filterResults('inc'));
            document.getElementById('ce-dec').addEventListener('click', () => filterResults('dec'));
            document.getElementById('ce-changed').addEventListener('click', () => filterResults('changed'));
            document.getElementById('ce-reset').addEventListener('click', function() {
                results = [];
                document.getElementById('ce-results').innerHTML = '';
                updateStatus('Reset');
            });
            document.getElementById('ce-view-addr').addEventListener('click', viewManualAddr);
            document.getElementById('cheat-close-btn').addEventListener('click', () => window.close());

            updateStatus('Ready. Connected to game.');
            console.log('🔧 Cheat Engine UI loaded (standalone).');
        })();
    </script>
</body>
</html>
