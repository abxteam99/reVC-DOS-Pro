<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no" />
    <title>GTA: Vice City – Launcher</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #100a36;
            background-image: linear-gradient(to bottom, #120731, #17022b);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #8975c3;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .start-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 1.5em;
            gap: 1.5em;
        }
        .title {
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            font-weight: bold;
            text-shadow: 0 0 20px #ff4193aa;
            color: #fff;
            text-align: center;
            letter-spacing: 2px;
        }
        .title span { color: #ff4193; }
        .config-panel {
            width: 100%;
            padding: 1.5em;
            border: 2px solid #2a1759;
            border-radius: 1em;
            backdrop-filter: blur(20px);
            background: rgba(16,10,54,0.7);
            color: #fff;
            text-align: left;
        }
        .config-panel .config-option {
            margin: 0.7em 0;
        }
        .config-panel label {
            display: flex;
            align-items: center;
            gap: 0.5em;
            cursor: pointer;
            flex-wrap: wrap;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
        }
        .config-panel input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #ff4193;
        }
        .config-panel select,
        .config-panel input[type="number"] {
            background: rgba(0,0,0,0.5);
            border: 1px solid #2a1759;
            color: #fff;
            padding: 0.4em;
            border-radius: 0.4em;
            font-size: inherit;
        }
        .config-panel select { min-width: 100px; }
        .config-panel input[type="number"] { width: 70px; }
        .button-row {
            display: flex;
            gap: 1em;
            width: 100%;
            max-width: 300px;
            justify-content: center;
        }
        .play-button {
            background: none;
            cursor: pointer;
            border: 2px solid #ff4193;
            color: #ff4193;
            text-transform: uppercase;
            padding: .6em 2em;
            font-weight: bold;
            border-radius: .7em;
            box-shadow: inset 0 0 .5em #ff4193aa, 0 0 .75em #ff4193aa;
            text-shadow: 0 0 5px #ff4193aa, 0 0 1em #ff4193;
            font-size: clamp(1rem, 4vw, 1.8rem);
            transition: all 0.2s;
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        .play-button:hover,
        .play-button:focus {
            background: #ff4193;
            color: #fff;
        }
        .version {
            font-size: 0.8rem;
            color: #666;
            margin-top: 1em;
        }
    </style>
</head>
<body>
    <div class="start-container">
        <div class="title">GTA <span>Vice City</span></div>
        <div id="config-panel" class="config-panel">
            <div class="config-option">
                <label for="config-mode">
                    <span>Mode:</span>
                    <select id="config-mode">
                        <option value="auto">Auto (detect)</option>
                        <option value="touch" selected>Touch</option>
                        <option value="desktop">Desktop</option>
                    </select>
                </label>
            </div>
            <div class="config-option">
                <label for="config-touch-controls">
                    <input type="checkbox" id="config-touch-controls" checked>
                    <span>Show touch controls</span>
                </label>
            </div>
            <div class="config-option">
                <label for="config-cheats">
                    <input type="checkbox" id="config-cheats" checked>
                    <span>Cheats</span>
                </label>
            </div>
            <div class="config-option">
                <label for="config-lowmem">
                    <input type="checkbox" id="config-lowmem">
                    <span>Low Memory Mode</span>
                </label>
            </div>
        </div>
        <div class="button-row">
            <button class="play-button" id="play-btn">▶ Play</button>
        </div>
        <div class="version">reVC · Web Port</div>
    </div>
    <script>
        (function() {
            function loadSettings() {
                try {
                    const saved = localStorage.getItem('vcsky.settings');
                    if (saved) {
                        const settings = JSON.parse(saved);
                        if (settings.mode) document.getElementById('config-mode').value = settings.mode;
                        if (settings.touchControls !== undefined) document.getElementById('config-touch-controls').checked = settings.touchControls;
                        if (settings.cheats !== undefined) document.getElementById('config-cheats').checked = settings.cheats;
                        if (settings.lowMemory !== undefined) document.getElementById('config-lowmem').checked = settings.lowMemory;
                    }
                } catch (e) {}
            }
            function saveAndRedirect() {
                const mode = document.getElementById('config-mode').value;
                const touchControls = document.getElementById('config-touch-controls').checked;
                const cheats = document.getElementById('config-cheats').checked;
                const lowMemory = document.getElementById('config-lowmem').checked;
                const settings = { mode, touchControls, cheats, lowMemory };
                localStorage.setItem('vcsky.settings', JSON.stringify(settings));
                localStorage.setItem('vcsky.mode', mode);
                localStorage.setItem('vcsky.touchControls', touchControls ? '1' : '0');
                localStorage.setItem('vcsky.cheats', cheats ? '1' : '0');
                localStorage.setItem('vcsky.lowMemory', lowMemory ? '1' : '0');
                window.location.href = 'game.html';
            }
            document.getElementById('play-btn').addEventListener('click', saveAndRedirect);
            loadSettings();
            console.log('🎮 Launcher ready.');
        })();
    </script>
</body>
</html>
